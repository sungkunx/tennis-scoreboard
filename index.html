<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테니스 점수판</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        
        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDcq4qxi-B996KSfRLujBEobq4TP2FS2_w",
            authDomain: "tennis-scoreboard-4fcad.firebaseapp.com",
            projectId: "tennis-scoreboard-4fcad",
            storageBucket: "tennis-scoreboard-4fcad.firebasestorage.app",
            messagingSenderId: "1024153372160",
            appId: "1:1024153372160:web:a1638184a214ff0c58bae5"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 전역으로 사용할 수 있도록 window 객체에 추가
        window.firebaseDB = db;
        window.firebaseUtils = {
            doc,
            setDoc,
            getDoc,
            onSnapshot,
            collection,
            query,
            where
        };
        
        console.log('🔥 Firebase 초기화 완료');
    </script>
    <style>
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            @apply bg-blue-500 hover:bg-blue-600 text-white font-medium py-3 px-6 rounded-lg shadow-md transition-colors duration-200;
        }
        .btn-secondary {
            @apply bg-gray-500 hover:bg-gray-600 text-white font-medium py-3 px-6 rounded-lg shadow-md transition-colors duration-200;
        }
        .btn-danger {
            @apply bg-red-500 hover:bg-red-600 text-white font-medium py-2 px-4 rounded-lg shadow-md transition-colors duration-200;
        }
        .input-field {
            @apply w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent;
        }
        .select-field {
            @apply w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 메인 앱 컴포넌트
        function TennisScoreboardApp() {
            const [currentScreen, setCurrentScreen] = useState('main');
            const [meetings, setMeetings] = useState([]);
            const [currentMeeting, setCurrentMeeting] = useState(null);
            const [gameSettings, setGameSettings] = useState(null);
            const [serverMode, setServerMode] = useState(null); // null, 'guest', 'server'
            const [roomCode, setRoomCode] = useState('');
            const [clubName, setClubName] = useState('');
            const [showAuthModal, setShowAuthModal] = useState(true);
            const [sharedMeetingId, setSharedMeetingId] = useState(null);
            const [copyData, setCopyData] = useState(null);

            // 초기화 및 URL 파라미터 확인
            useEffect(() => {
                // URL에서 파라미터 확인
                const urlParams = new URLSearchParams(window.location.search);
                const shareId = urlParams.get('share');
                const roomParam = urlParams.get('room');
                const meetingParam = urlParams.get('meeting');
                
                if (roomParam && meetingParam) {
                    // 서버 모드로 특정 방과 모임에 접속
                    setShowAuthModal(false);
                    setServerMode('server');
                    setRoomCode(roomParam);
                    loadFromServerAndSelectMeeting(roomParam, meetingParam);
                } else if (shareId) {
                    // 로컬 공유 링크
                    setSharedMeetingId(shareId);
                    setShowAuthModal(false);
                    setServerMode('guest');
                    loadSharedMeeting(shareId);
                } else {
                    // 일반 접속
                    const savedMeetings = localStorage.getItem('tennis-meetings');
                    const savedMode = localStorage.getItem('tennis-server-mode');
                    const savedRoomCode = localStorage.getItem('tennis-room-code');
                    const savedClubName = localStorage.getItem('tennis-club-name');
                    
                    if (savedMeetings) {
                        try {
                            setMeetings(JSON.parse(savedMeetings));
                        } catch (error) {
                            console.error('데이터 로드 실패:', error);
                        }
                    }
                    
                    if (savedMode) {
                        setServerMode(savedMode);
                        setRoomCode(savedRoomCode || '');
                        setClubName(savedClubName || '');
                        setShowAuthModal(false);
                    }
                }
            }, []);

            const loadSharedMeeting = async (shareId) => {
                try {
                    console.log('공유된 모임 로드:', shareId);
                    
                    // 먼저 로컬에서 찾기
                    const savedMeetings = localStorage.getItem('tennis-meetings');
                    if (savedMeetings) {
                        const meetings = JSON.parse(savedMeetings);
                        const sharedMeeting = meetings.find(m => m.id.toString() === shareId);
                        if (sharedMeeting) {
                            setCurrentMeeting(sharedMeeting);
                            if (sharedMeeting.gameSettings) {
                                setGameSettings(sharedMeeting.gameSettings);
                                setCurrentScreen('game');
                            }
                            return;
                        }
                    }
                    
                    // Firebase에서 모든 방을 검색해서 해당 미팅 찾기 (임시 방법)
                    // 실제로는 미팅 ID를 별도 컬렉션으로 관리하는 것이 좋음
                    console.log('로컬에서 찾을 수 없어 Firebase 검색 생략');
                    alert('공유 링크를 찾을 수 없습니다.');
                    
                } catch (error) {
                    console.error('공유 모임 로드 실패:', error);
                    alert('공유 링크를 불러올 수 없습니다.');
                }
            };

            // 데이터 저장
            const saveMeetings = useCallback((updatedMeetings) => {
                try {
                    if (serverMode === 'server') {
                        // 서버에 저장 (API 호출)
                        saveToServer(updatedMeetings);
                    } else {
                        // 로컬 저장
                        localStorage.setItem('tennis-meetings', JSON.stringify(updatedMeetings));
                    }
                    setMeetings(updatedMeetings);
                } catch (error) {
                    alert('저장 중 오류가 발생했습니다.');
                }
            }, [serverMode]);

            const saveToServer = async (meetings) => {
                try {
                    if (!window.firebaseDB || !roomCode) {
                        console.log('Firebase 또는 roomCode 없음');
                        return;
                    }
                    
                    const { doc, setDoc } = window.firebaseUtils;
                    const roomRef = doc(window.firebaseDB, 'rooms', roomCode);
                    
                    await setDoc(roomRef, {
                        clubName: clubName,
                        meetings: meetings,
                        lastUpdated: new Date().toISOString(),
                        createdAt: new Date().toISOString()
                    }, { merge: true });
                    
                    console.log('🔥 Firebase에 저장 완료:', { roomCode, meetings: meetings.length });
                } catch (error) {
                    console.error('Firebase 저장 실패:', error);
                    alert('저장 중 오류가 발생했습니다: ' + error.message);
                }
            };

            const handleAuthMode = (mode, code = '', club = '') => {
                setServerMode(mode);
                setRoomCode(code);
                setClubName(club);
                setShowAuthModal(false);
                
                // 설정 저장
                localStorage.setItem('tennis-server-mode', mode);
                if (code) {
                    localStorage.setItem('tennis-room-code', code);
                }
                if (club) {
                    localStorage.setItem('tennis-club-name', club);
                }
                
                if (mode === 'server' && code) {
                    // 서버에서 기존 모임 데이터 로드
                    loadFromServer(code);
                }
            };

            const loadFromServer = async (code) => {
                try {
                    if (!window.firebaseDB) {
                        console.log('Firebase 없음');
                        return;
                    }
                    
                    const { doc, getDoc } = window.firebaseUtils;
                    const roomRef = doc(window.firebaseDB, 'rooms', code);
                    const roomSnap = await getDoc(roomRef);
                    
                    if (roomSnap.exists()) {
                        const roomData = roomSnap.data();
                        console.log('🔥 Firebase에서 데이터 로드:', roomData);
                        
                        if (roomData.meetings) {
                            setMeetings(roomData.meetings);
                        }
                        if (roomData.clubName) {
                            setClubName(roomData.clubName);
                        }
                        
                        // 실시간 리스너 설정
                        setupRealtimeListener(code);
                    } else {
                        console.log('해당 코드의 방이 존재하지 않습니다');
                        // 새로운 방 생성을 위해 빈 상태로 시작
                    }
                } catch (error) {
                    console.error('Firebase 데이터 로드 실패:', error);
                    alert('데이터 로드 중 오류가 발생했습니다: ' + error.message);
                }
            };

            const loadFromServerAndSelectMeeting = async (code, meetingId) => {
                try {
                    if (!window.firebaseDB) {
                        console.log('Firebase 없음');
                        alert('서버에 연결할 수 없습니다.');
                        return;
                    }
                    
                    const { doc, getDoc } = window.firebaseUtils;
                    const roomRef = doc(window.firebaseDB, 'rooms', code);
                    const roomSnap = await getDoc(roomRef);
                    
                    if (roomSnap.exists()) {
                        const roomData = roomSnap.data();
                        console.log('🔥 Firebase에서 데이터 로드:', roomData);
                        
                        if (roomData.meetings) {
                            setMeetings(roomData.meetings);
                            
                            // 특정 모임 찾기
                            const targetMeeting = roomData.meetings.find(m => m.id.toString() === meetingId);
                            if (targetMeeting) {
                                setCurrentMeeting(targetMeeting);
                                if (targetMeeting.gameSettings) {
                                    setGameSettings(targetMeeting.gameSettings);
                                    setCurrentScreen('game');
                                } else {
                                    setCurrentScreen('settings');
                                }
                            } else {
                                alert('해당 모임을 찾을 수 없습니다.');
                                setCurrentScreen('main');
                            }
                        }
                        if (roomData.clubName) {
                            setClubName(roomData.clubName);
                        }
                        
                        // 실시간 리스너 설정
                        setupRealtimeListener(code);
                    } else {
                        console.log('해당 코드의 방이 존재하지 않습니다');
                        alert('존재하지 않는 코드입니다.');
                    }
                } catch (error) {
                    console.error('Firebase 데이터 로드 실패:', error);
                    alert('데이터 로드 중 오류가 발생했습니다: ' + error.message);
                }
            };

            // 실시간 동기화 리스너 설정
            const setupRealtimeListener = (code) => {
                if (!window.firebaseDB) return;
                
                try {
                    const { doc, onSnapshot } = window.firebaseUtils;
                    const roomRef = doc(window.firebaseDB, 'rooms', code);
                    
                    const unsubscribe = onSnapshot(roomRef, (doc) => {
                        if (doc.exists()) {
                            const roomData = doc.data();
                            console.log('🔥 실시간 업데이트:', roomData);
                            
                            if (roomData.meetings) {
                                setMeetings(roomData.meetings);
                            }
                        }
                    });
                    
                    // 언마운트시 리스너 정리를 위해 저장
                    window.unsubscribeFirebase = unsubscribe;
                } catch (error) {
                    console.error('실시간 리스너 설정 실패:', error);
                }
            };

            const screens = {
                main: <MainScreen 
                    meetings={meetings}
                    serverMode={serverMode}
                    roomCode={roomCode}
                    clubName={clubName}
                    onAddMeeting={(copyMeetingData) => {
                        setCopyData(copyMeetingData);
                        setCurrentScreen('create');
                    }}
                    onSelectMeeting={(meeting) => {
                        setCurrentMeeting(meeting);
                        // 기존 모임인 경우 저장된 gameSettings가 있으면 사용, 없으면 설정 화면으로
                        if (meeting.gameSettings) {
                            setGameSettings(meeting.gameSettings);
                            setCurrentScreen('game');
                        } else {
                            setCurrentScreen('settings');
                        }
                    }}
                    onJoinRoom={handleAuthMode}
                />,
                create: <CreateMeetingScreen 
                    onBack={() => {
                        setCopyData(null);
                        setCurrentScreen('main');
                    }}
                    onNext={(meetingData) => {
                        setCurrentMeeting(meetingData);
                        setCopyData(null);
                        setCurrentScreen('settings');
                    }}
                    initialData={copyData}
                />,
                settings: <GameSettingsScreen 
                    meetingData={currentMeeting}
                    onBack={() => setCurrentScreen('create')}
                    onNext={(settings) => {
                        setGameSettings(settings);
                        setCurrentScreen('preview');
                    }}
                />,
                preview: <MatchPreviewScreen 
                    meetingData={currentMeeting}
                    gameSettings={gameSettings}
                    onBack={() => setCurrentScreen('settings')}
                    onConfirm={() => setCurrentScreen('game')}
                />,
                game: <GameScreen 
                    meetingData={currentMeeting}
                    gameSettings={gameSettings}
                    serverMode={serverMode}
                    roomCode={roomCode}
                    clubName={clubName}
                    onBack={() => setCurrentScreen('main')}
                    onSave={(updatedMeeting) => {
                        const updatedMeetings = meetings.map(m => 
                            m.id === updatedMeeting.id ? updatedMeeting : m
                        );
                        if (!meetings.find(m => m.id === updatedMeeting.id)) {
                            updatedMeetings.push(updatedMeeting);
                        }
                        saveMeetings(updatedMeetings);
                    }}
                />
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {screens[currentScreen]}
                    
                    {/* 인증 모달 */}
                    {showAuthModal && <AuthModal onAuth={handleAuthMode} />}
                </div>
            );
        }

        // 인증 모달 컴포넌트
        function AuthModal({ onAuth }) {
            const [inputCode, setInputCode] = useState('');
            const [clubName, setClubName] = useState('');
            const [showCodeInput, setShowCodeInput] = useState(false);
            const [showCreateNew, setShowCreateNew] = useState(false);
            const [error, setError] = useState('');

            // 랜덤 코드 생성 함수
            const generateRandomCode = () => {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let result = '';
                for (let i = 0; i < 4; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            };

            const handleServerMode = async () => {
                if (!inputCode.trim()) {
                    setError('코드를 입력해주세요.');
                    return;
                }
                if (inputCode.trim().length < 4) {
                    setError('코드는 4자리 이상이어야 합니다.');
                    return;
                }
                
                // Firebase에서 코드 존재 확인
                try {
                    if (window.firebaseDB) {
                        const { doc, getDoc } = window.firebaseUtils;
                        const roomRef = doc(window.firebaseDB, 'rooms', inputCode.trim());
                        const roomSnap = await getDoc(roomRef);
                        
                        if (!roomSnap.exists()) {
                            setError('존재하지 않는 코드입니다.');
                            return;
                        }
                    }
                    
                    onAuth('server', inputCode.trim());
                } catch (error) {
                    console.error('코드 확인 실패:', error);
                    setError('코드 확인 중 오류가 발생했습니다.');
                }
            };

            const handleCreateNew = () => {
                if (!clubName.trim()) {
                    setError('테니스 클럽 이름을 입력해주세요.');
                    return;
                }
                if (clubName.trim().length < 2) {
                    setError('클럽 이름은 2글자 이상이어야 합니다.');
                    return;
                }
                const newCode = generateRandomCode();
                onAuth('server', newCode, clubName.trim());
            };

            const handleGuestMode = () => {
                onAuth('guest');
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-lg w-full max-w-md p-6">
                        <div className="text-center mb-6">
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">테니스 점수판</h2>
                            <p className="text-gray-600">어떻게 사용하시겠습니까?</p>
                        </div>

                        {!showCodeInput && !showCreateNew ? (
                            <div className="space-y-4">
                                <button
                                    onClick={() => setShowCreateNew(true)}
                                    className="btn-primary w-full"
                                >
                                    새로 시작하기
                                </button>
                                <button
                                    onClick={() => setShowCodeInput(true)}
                                    className="btn-secondary w-full"
                                >
                                    코드 입력하기 (이어하기)
                                </button>
                                <button
                                    onClick={handleGuestMode}
                                    className="btn-secondary w-full"
                                >
                                    게스트로 진행
                                </button>
                                <p className="text-sm text-gray-500 text-center">
                                    게스트로 진행시 서버에 데이터가 저장되지 않습니다
                                </p>
                            </div>
                        ) : showCreateNew ? (
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">
                                        테니스 클럽명을 입력하세요
                                    </label>
                                    <input
                                        type="text"
                                        value={clubName}
                                        onChange={(e) => {
                                            setClubName(e.target.value);
                                            setError('');
                                        }}
                                        placeholder="예: 파미르 테니스 클럽"
                                        className="input-field"
                                        maxLength={30}
                                        autoFocus
                                    />
                                    {error && (
                                        <p className="text-red-500 text-sm mt-2">{error}</p>
                                    )}
                                    <p className="text-sm text-gray-500 mt-2">
                                        새로운 코드가 자동 생성됩니다
                                    </p>
                                </div>
                                <div className="flex space-x-3">
                                    <button
                                        onClick={handleCreateNew}
                                        className="btn-primary flex-1"
                                    >
                                        시작하기
                                    </button>
                                    <button
                                        onClick={() => {
                                            setShowCreateNew(false);
                                            setClubName('');
                                            setError('');
                                        }}
                                        className="btn-secondary flex-1"
                                    >
                                        뒤로
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-gray-700 font-medium mb-2">
                                        모임 코드를 입력하세요
                                    </label>
                                    <input
                                        type="text"
                                        value={inputCode}
                                        onChange={(e) => {
                                            setInputCode(e.target.value);
                                            setError('');
                                        }}
                                        placeholder="예: ABCD1234"
                                        className="input-field"
                                        maxLength={20}
                                        autoFocus
                                    />
                                    {error && (
                                        <p className="text-red-500 text-sm mt-2">{error}</p>
                                    )}
                                </div>
                                <div className="flex space-x-3">
                                    <button
                                        onClick={handleServerMode}
                                        className="btn-primary flex-1"
                                    >
                                        확인
                                    </button>
                                    <button
                                        onClick={() => {
                                            setShowCodeInput(false);
                                            setInputCode('');
                                            setError('');
                                        }}
                                        className="btn-secondary flex-1"
                                    >
                                        뒤로
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 메인 화면 컴포넌트
        function MainScreen({ meetings, serverMode, roomCode, clubName, onAddMeeting, onSelectMeeting, onJoinRoom }) {
            const [showAddForm, setShowAddForm] = useState(false);
            const [meetingName, setMeetingName] = useState('');
            const [error, setError] = useState('');
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [showJoinModal, setShowJoinModal] = useState(false);

            const handleAddMeeting = () => {
                if (!meetingName.trim()) {
                    setError('모임 이름을 입력해주세요.');
                    return;
                }
                if (meetingName.trim().length < 2) {
                    setError('모임 이름은 2글자 이상 입력해주세요.');
                    return;
                }
                
                const newMeeting = {
                    id: Date.now(),
                    name: meetingName.trim(),
                    date: new Date().toISOString().split('T')[0],
                    members: [],
                    createdAt: new Date().toISOString()
                };
                
                setMeetingName('');
                setShowAddForm(false);
                setError('');
                onAddMeeting(newMeeting);
            };

            const handleCancel = () => {
                setMeetingName('');
                setShowAddForm(false);
                setError('');
            };

            return (
                <div className="p-4">
                    <div className="text-center mb-8">
                        <h1 className="text-3xl font-bold text-gray-800 mb-2">Tennis Score AI</h1>
                        {serverMode === 'server' && clubName && roomCode && (
                            <div className="mb-3">
                                <span className="text-blue-600 font-medium">{clubName}</span>
                                <span className="text-gray-500 ml-2">({roomCode})</span>
                            </div>
                        )}
                        <p className="text-gray-600">모임을 선택하거나 새로 만드세요.</p>
                    </div>


                    {/* 기존 모임 목록 */}
                    <div className="mb-6">
                        {meetings.length > 0 && (
                            <div className="space-y-3">
                                <h2 className="text-lg font-semibold text-gray-700 mb-3">기존 모임</h2>
                                {meetings.map(meeting => (
                                    <div 
                                        key={meeting.id}
                                        className="bg-white p-4 rounded-lg shadow-md border border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors"
                                        onClick={() => onSelectMeeting(meeting)}
                                    >
                                        <h3 className="font-medium text-gray-800">{meeting.name}</h3>
                                        <p className="text-sm text-gray-500 mt-1">

        // 코드 입력 모달 컴포넌트

            const [inputCode, setInputCode] = useState('');
            const [error, setError] = useState('');

            const handleJoin = async () => {
                if (!inputCode.trim()) {
                    setError('코드를 입력해주세요.');
                    return;
                }
                if (inputCode.trim().length < 4) {
                    setError('코드는 4자리 이상이어야 합니다.');
                    return;
                }
                
                // Firebase에서 코드 존재 확인
                try {
                    if (window.firebaseDB) {
                        const { doc, getDoc } = window.firebaseUtils;
                        const roomRef = doc(window.firebaseDB, 'rooms', inputCode.trim());
                        const roomSnap = await getDoc(roomRef);
                        
                        if (!roomSnap.exists()) {
                            setError('존재하지 않는 코드입니다.');
                            return;
                        }
                    }
                    
                    onJoin(inputCode.trim());
                } catch (error) {
                    console.error('코드 확인 실패:', error);
                    setError('코드 확인 중 오류가 발생했습니다.');

        // 경기 미리보기 화면 컴포넌트
        function MatchPreviewScreen({ meetingData, gameSettings, onBack, onConfirm }) {
            const [matches, setMatches] = useState([]);

            // 매치 생성 함수 (중복 조합 방지 및 연속 경기 방지)
            const generateMatches = useCallback(() => {
                if (!meetingData || !gameSettings) {
                    return [];
                }

                const members = [...meetingData.members];
                const { skillBased, genderSeparated, completelyRandom, courtCount, matchCount } = gameSettings;
                
                const generatedMatches = [];
                const usedTeamCombinations = new Set(); // 사용된 팀 조합 추적
                const memberPlayCount = {}; // 각 멤버의 경기 참여 횟수 추적
                const memberLastMatch = {}; // 각 멤버의 마지막 경기 라운드
                
                // 멤버별 카운터 초기화
                members.forEach(member => {
                    memberPlayCount[member.name] = 0;
                    memberLastMatch[member.name] = -2; // -2로 초기화하여 첫 경기는 항상 가능하도록
                });

                // 팀 조합 키 생성 함수 (정렬된 이름으로 고유 키 생성)
                const getTeamKey = (team1, team2) => {
                    const allPlayers = [...team1, ...team2].map(p => p.name).sort();
                    return allPlayers.join('-');
                };

                // 연속 경기 확인 함수
                const canPlayInMatch = (players, matchIndex) => {
                    return players.every(player => {
                        const lastMatch = memberLastMatch[player.name];
                        return lastMatch < matchIndex - 1; // 최소 1라운드 휴식
                    });
                };

                // 최적의 팀 조합 찾기 함수
                const findBestTeamCombination = (availableMembers, matchIndex) => {
                    let bestCombination = null;
                    let minPlayCountDiff = Infinity;
                    let attempts = 0;
                    const maxAttempts = 100;

                    while (attempts < maxAttempts && availableMembers.length >= 4) {
                        let team1, team2;
                        
                        if (completelyRandom) {
                            // 완전 랜덤 매칭
                            const shuffled = [...availableMembers].sort(() => Math.random() - 0.5);
                            team1 = shuffled.slice(0, 2);
                            team2 = shuffled.slice(2, 4);
                        } else {
                            // 설정에 따른 스마트 매칭
                            let candidates = [...availableMembers];
                            
                            // 실력순 반영시 정렬 (하지만 약간의 랜덤성 추가)
                            if (skillBased) {
                                candidates.sort((a, b) => {
                                    const skillDiff = b.skill - a.skill;
                                    const randomFactor = (Math.random() - 0.5) * 0.5; // 약간의 랜덤성
                                    return skillDiff + randomFactor;
                                });
                            }
                            
                            // 성별 구분시 같은 성별끼리 우선 매칭
                            if (genderSeparated) {
                                const males = candidates.filter(m => m.gender === '남');
                                const females = candidates.filter(m => m.gender === '여');
                                const others = candidates.filter(m => m.gender === '없음');
                                
                                if (males.length >= 4) {
                                    team1 = males.slice(0, 2);
                                    team2 = males.slice(2, 4);
                                } else if (females.length >= 4) {
                                    team1 = females.slice(0, 2);
                                    team2 = females.slice(2, 4);
                                } else if (others.length >= 4) {
                                    team1 = others.slice(0, 2);
                                    team2 = others.slice(2, 4);
                                } else {
                                    // 혼성으로 매칭
                                    team1 = candidates.slice(0, 2);
                                    team2 = candidates.slice(2, 4);
                                }
                            } else {
                                // 성별 구분 없이 매칭
                                team1 = candidates.slice(0, 2);
                                team2 = candidates.slice(2, 4);
                            }
                        }

                        const teamKey = getTeamKey(team1, team2);
                        const allPlayers = [...team1, ...team2];

                        // 조건 확인: 중복 조합 방지, 연속 경기 방지
                        if (!usedTeamCombinations.has(teamKey) && canPlayInMatch(allPlayers, matchIndex)) {
                            // 경기 균형 점수 계산 (참여 횟수 차이가 적을수록 좋음)
                            const playCountDiff = Math.max(...allPlayers.map(p => memberPlayCount[p.name])) - 
                                                Math.min(...allPlayers.map(p => memberPlayCount[p.name]));
                            
                            if (playCountDiff < minPlayCountDiff) {
                                minPlayCountDiff = playCountDiff;
                                bestCombination = { team1, team2, teamKey };
                            }
                            
                            // 완벽한 조합을 찾으면 바로 반환
                            if (playCountDiff === 0) {
                                break;
                            }
                        }

                        attempts++;
                        
                        // 후보군을 약간 섞어서 다시 시도
                        availableMembers.sort(() => Math.random() - 0.5);
                    }

                    return bestCombination;
                };

                // 매치 생성 로직
                for (let i = 0; i < matchCount; i++) {
                    const matchCourts = [];
                    let availableMembers = [...members];
                    
                    for (let court = 0; court < courtCount && availableMembers.length >= 4; court++) {
                        const combination = findBestTeamCombination(availableMembers, i);
                        
                        if (combination) {
                            const { team1, team2, teamKey } = combination;
                            
                            // 조합 사용 표시
                            usedTeamCombinations.add(teamKey);
                            
                            // 참여 횟수 및 마지막 경기 업데이트
                            [...team1, ...team2].forEach(player => {
                                memberPlayCount[player.name]++;
                                memberLastMatch[player.name] = i;
                            });
                            
                            // 사용된 멤버들을 availableMembers에서 제거
                            availableMembers = availableMembers.filter(m => 
                                !team1.includes(m) && !team2.includes(m)
                            );

                            matchCourts.push({
                                courtId: court,
                                team1: team1.filter(Boolean),
                                team2: team2.filter(Boolean)
                            });
                        }
                    }
                    
                    if (matchCourts.length > 0) {
                        generatedMatches.push({
                            matchId: i,
                            courts: matchCourts
                        });
                    }
                }

                return generatedMatches;
            }, [meetingData, gameSettings]);

            // 초기 매치 생성
            useEffect(() => {
                if (meetingData && gameSettings) {
                    const newMatches = generateMatches();
                    setMatches(newMatches);
                }
            }, [meetingData, gameSettings, generateMatches]);

            const handleRegenerate = () => {
                const newMatches = generateMatches();
                setMatches(newMatches);
            };

            return (
                <div className="p-4">
                    <div className="flex items-center mb-6">
                        <button 
                            onClick={onBack}
                            className="text-blue-500 mr-3 text-lg"
                        >
                            ← 뒤로
                        </button>
                        <h1 className="text-2xl font-bold text-gray-800">대진표 미리보기</h1>
                    </div>

                    {/* 게임 설정 요약 */}
                    <div className="bg-white p-4 rounded-lg shadow-md mb-4">
                        <h2 className="text-lg font-semibold text-gray-700 mb-3">게임 설정</h2>
                        <div className="grid grid-cols-2 gap-3 text-sm text-gray-600">
                            <div>게임 형식: {gameSettings?.gameType}게임</div>
                            <div>코트 수: {gameSettings?.courtCount}개</div>
                            <div>매치 수: {gameSettings?.matchCount}경기</div>
                            <div>
                                매칭 방식: {
                                    gameSettings?.completelyRandom ? '완전 랜덤' :
                                    gameSettings?.skillBased && gameSettings?.genderSeparated ? '실력·성별 분리' :
                                    gameSettings?.skillBased ? '실력순 반영' :
                                    gameSettings?.genderSeparated ? '남녀 구분' :
                                    '기본'
                                }
                            </div>
                        </div>
                    </div>

                    {/* 대진표 */}
                    <div className="bg-white rounded-lg shadow-md mb-6">
                        <div className="p-4 border-b">
                            <h2 className="text-lg font-semibold text-gray-700">대진표</h2>
                        </div>
                        <div className="p-4 space-y-4">
                            {matches.length === 0 ? (
                                <div className="text-center py-8 text-gray-500">
                                    <p>대진표를 생성할 수 없습니다.</p>
                                    <p className="text-sm mt-2">멤버 수가 부족하거나 설정에 문제가 있을 수 있습니다.</p>
                                </div>
                            ) : (
                                matches.map(match => (
                                    <div key={match.matchId} className="border rounded-lg p-3">
                                        <h3 className="font-medium text-gray-700 mb-3">{match.matchId + 1}경기</h3>
                                        {match.courts.map(court => (
                                            <div key={court.courtId} className="mb-3 last:mb-0">
                                                <div className="text-sm text-gray-600 mb-2">{court.courtId + 1}번 코트</div>
                                                <div className="flex items-center justify-between bg-gray-50 p-3 rounded">
                                                    <div className="text-sm">
                                                        <div className="font-medium text-blue-600">
                                                            {court.team1.map(m => `${m.name}(${m.skill})`).join(', ')}
                                                        </div>
                                                    </div>
                                                    <div className="text-gray-400 font-bold text-lg">VS</div>
                                                    <div className="text-sm text-right">
                                                        <div className="font-medium text-red-600">
                                                            {court.team2.map(m => `${m.name}(${m.skill})`).join(', ')}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* 확인 질문 */}
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                        <p className="text-center text-gray-700 font-medium">
                            이대로 진행하시겠습니까?
                        </p>
                    </div>

                    {/* 하단 버튼들 */}
                    <div className="space-y-3">
                        <button
                            onClick={onConfirm}
                            className="btn-primary w-full"
                            disabled={matches.length === 0}
                        >
                            진행하기
                        </button>
                        <button
                            onClick={handleRegenerate}
                            className="btn-secondary w-full"
                        >
                            다시하기 (대진표 재생성)
                        </button>
                    </div>
                </div>
            );
        }

        // 게임 설정 화면 컴포넌트
        function GameSettingsScreen({ meetingData, onBack, onNext }) {
            const [skillBased, setSkillBased] = useState(false); // 실력순 반영
            const [genderSeparated, setGenderSeparated] = useState(false); // 남녀 구분
            const [completelyRandom, setCompletelyRandom] = useState(true); // 완전 랜덤
            const [gameType, setGameType] = useState(6); // 4 or 6
            const [courtCount, setCourtCount] = useState(2);
            const [matchCount, setMatchCount] = useState(6);
            
            // 이전 설정 상태 저장
            const [previousSkillBased, setPreviousSkillBased] = useState(false);
            const [previousGenderSeparated, setPreviousGenderSeparated] = useState(false);

            // 완전 랜덤 토글 처리
            const handleCompletelyRandomChange = (value) => {
                if (value) {
                    // 완전 랜덤을 켤 때: 현재 설정을 저장하고 끄기
                    setPreviousSkillBased(skillBased);
                    setPreviousGenderSeparated(genderSeparated);
                    setSkillBased(false);
                    setGenderSeparated(false);
                } else {
                    // 완전 랜덤을 끌 때: 이전 설정 복원
                    setSkillBased(previousSkillBased);
                    setGenderSeparated(previousGenderSeparated);
                }
                setCompletelyRandom(value);
            };

            // 개별 설정 변경 시 이전 설정도 업데이트
            const handleSkillBasedChange = (value) => {
                if (!completelyRandom) {
                    setSkillBased(value);
                    setPreviousSkillBased(value);
                }
            };

            const handleGenderSeparatedChange = (value) => {
                if (!completelyRandom) {
                    setGenderSeparated(value);
                    setPreviousGenderSeparated(value);
                }
            };

            const handleNext = () => {
                const settings = {
                    skillBased,
                    genderSeparated,
                    completelyRandom,
                    gameType,
                    courtCount,
                    matchCount
                };
                onNext(settings);
            };

            return (
                <div className="p-4">
                    <div className="flex items-center mb-6">
                        <button 
                            onClick={onBack}
                            className="text-blue-500 mr-3 text-lg"
                        >
                            ← 뒤로
                        </button>
                        <h1 className="text-2xl font-bold text-gray-800">경기 설정</h1>
                    </div>

                    {/* 대전 구축 방식 */}
                    <div className="bg-white p-4 rounded-lg shadow-md mb-4">
                        <h2 className="text-lg font-semibold text-gray-700 mb-4">대전 구축 방식</h2>
                        
                        {/* 실력순 반영 */}
                        <div className="flex items-center justify-between mb-4">
                            <span className="text-gray-700">실력순 반영</span>
                            <button
                                onClick={() => handleSkillBasedChange(!skillBased)}
                                disabled={completelyRandom}
                                className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 ${
                                    completelyRandom 
                                        ? 'bg-gray-300 cursor-not-allowed' 
                                        : skillBased 
                                            ? 'bg-blue-600' 
                                            : 'bg-gray-200'
                                }`}
                            >
                                <span
                                    className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${
                                        skillBased && !completelyRandom ? 'translate-x-6' : 'translate-x-1'
                                    }`}
                                />
                            </button>
                        </div>

                        {/* 남녀 구분 */}
                        <div className="flex items-center justify-between mb-6">
                            <div>
                                <span className="text-gray-700">남녀 구분</span>
                                <p className="text-xs text-gray-500">ON: 남녀 구분 / OFF: 혼복 가능</p>
                            </div>
                            <button
                                onClick={() => handleGenderSeparatedChange(!genderSeparated)}
                                disabled={completelyRandom}
                                className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 ${
                                    completelyRandom

        // 모임 생성 화면 컴포넌트
        function CreateMeetingScreen({ onBack, onNext, initialData }) {
            const [date, setDate] = useState(initialData?.date || new Date().toISOString().split('T')[0]);
            const [members, setMembers] = useState(initialData?.members ? 
                initialData.members.map((member, i) => ({

                    id: i // ID 재할당

                    name: '',
                    gender: '남',

            const [showRandomModal, setShowRandomModal] = useState(false);

                    return;

                if (window.confirm('이 멤버를 삭제하시겠습니까?')) {
                    setMembers(members.filter(m => m.id !== id));
                }
            };

            const updateMember = (id, field, value) => {
                setMembers(members.map(m => 
                    m.id === id ? { ...m, [field]: value } : m
                ));
                if (errors[id]) {
                    setErrors({ ...errors, [id]: null });
                }
            };

            const generateRandomMembers = () => {
                const randomMembers = Array(randomCount).fill(null).map((_, i) => {
                    const charA = String.fromCharCode(65 + i); // A, B, C...
                    return {
                        id: Date.now() + i,
                        name: charA + charA + charA, // AAA, BBB, CCC...
                        gender: '남', // 동일하게 설정
                        skill: 5 // 동일하게 설정
                    };
                });
                setMembers(randomMembers);
                setShowRandomModal(false);
            };

            const validateAndProceed = () => {
                const newErrors = {};
                const filledMembers = members.filter(m => m.name.trim());

                    alert('최소 4명의 멤버가 필요합니다.');

                        newErrors[member.id] = '이름을 입력해주세요.';

            return (
                <div className="p-4">
                    <div className="flex items-center mb-6">
                        <button

                            ← 뒤로
                        </button>
                        <h1 className="text-2xl font-bold text-gray-800">모임 설정</h1>
                    </div>

                    {/* 모임 이름 입력 */}
                    <div className="bg-white p-4 rounded-lg shadow-md mb-4">
                        <label className="block text-gray-700 font-medium mb-2">모임 이름 (선택사항)</label>
                        <input
                            type="text"
                            value={meetingName}
                            onChange={(e) => setMeetingName(e.target.value)}

                            className="input-field"
                            maxLength={30}
                        />
                    </div>

                    {/* 날짜 입력 */}
                    <div className="bg-white p-4 rounded-lg shadow-md mb-4">
                        <label className="block text-gray-700 font-medium mb-2">경기 날짜</label>
                        <input
                            type="date"
                            value={date}
                            onChange={(e) => setDate(e.target.value)}
                            className="input-field"
                        />
                    </div>

                    {/* 멤버 입력 */}
                    <div className="bg-white p-4 rounded-lg shadow-md mb-4">
                        <h2 className="text-lg font-semibold text-gray-700 mb-4">멤버 ({members.filter(m => m.name.trim()).length}명)</h2>
                        
                        <div className="space-y-3">
                            {members.map(member => (
                                <div key={member.id} className="flex items-center space-x-2">
                                    <div className="flex-1">
                                        <input
                                            type="text"
                                            placeholder="이름"
                                            value={member.name}
                                            onChange={(e) => updateMember(member.id, 'name', e.target.value)}
                                            className={`input-field text-sm ${errors[member.id] ? 'border-red-500' : ''}`}
                                            maxLength={10}
                                        />
                                        {errors[member.id] && (
                                            <p className="text-red-500 text-xs mt-1">{errors[member.id]}</p>
                                        )}
                                    </div>
                                    <select
                                        value={member.gender}
                                        onChange={(e) => updateMember(member.id, 'gender', e.target.value)}
                                        className="select-field text-sm w-20"
                                    >
                                        <option value="남">남</option>
                                        <option value="여">여</option>
                                        <option value="없음">없음</option>
                                    </select>
                                    <select
                                        value={member.skill}
                                        onChange={(e) => updateMember(member.id, 'skill', parseInt(e.target.value))}
                                        className="select-field text-sm w-16"
                                    >

                            + 멤버 추가
                        </button>

                    {/* 하단 버튼들 */}
                    <div className="space-y-3">
                        <button
                            onClick={validateAndProceed}
                            className="btn-primary w-full"
                        >
                            입력 완료
                        </button>
                        <button
                            onClick={() => setShowRandomModal(true)}
                            className="btn-secondary w-full"
                        >
                            랜덤 생성
                        </button>
                    </div>

                    {/* 랜덤 생성 모달 */}
                    {showRandomModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-lg p-6 w-full max-w-sm">
                                <h3 className="text-lg font-semibold mb-4">랜덤 멤버 생성</h3>
                                <p className="text-sm text-gray-600 mb-4">몇 명으로 생성하시겠습니까?</p>
                                <input
                                    type="number"
                                    value={randomCount}
                                    onChange={(e) => setRandomCount(Math.max(4, Math.min(26, parseInt(e.target.value) || 4)))}
                                    min="4"
                                    max="26"
                                    className="input-field mb-4"
                                />
                                <div className="flex space-x-3">
                                    <button
                                        onClick={generateRandomMembers}
                                        className="btn-primary flex-1"
                                    >
                                        생성
                                    </button>
                                    <button
                                        onClick={() => setShowRandomModal(false)}
                                        className="btn-secondary flex-1"
                                    >
                                        취소
                                    </button>

                            </div>
                        </div>
                    )}

            );
