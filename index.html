        // 게임 진행 화면 컴포넌트
        function GameScreen({ meetingData, gameSettings, serverMode, roomCode, clubName, onBack, onSave }) {
            const [gameResults, setGameResults] = useState({});
            const [rankings, setRankings] = useState({});
            const [matches, setMatches] = useState([]);
            const [showSummary, setShowSummary] = useState(false);

            // 매치 생성 함수 (중복 조합 방지 및 연속 경기 방지)
            const generateMatches = useCallback(() => {
                if (!meetingData || !gameSettings) {
                    console.log('매치 생성 실패: 데이터 없음', { meetingData, gameSettings });
                    return [];
                }

                const members = [...meetingData.members];
                const { skillBased, genderSeparated, completelyRandom, courtCount, matchCount } = gameSettings;
                
                console.log('매치 생성 파라미터:', { members: members.length, skillBased, genderSeparated, completelyRandom, courtCount, matchCount });
                const generatedMatches = [];
                const usedTeamCombinations = new Set(); // 사용된 팀 조합 추적
                const memberPlayCount = {}; // 각 멤버의 경기 참여 횟수 추적
                const memberLastMatch = {}; // 각 멤버의 마지막 경기 라운드
                
                // 멤버별 카운터 초기화
                members.forEach(member => {
                    memberPlayCount[member.name] = 0;
                    memberLastMatch[member.name] = -2; // -2로 초기화하여 첫 경기는 항상 가능하도록
                });

                // 팀 조합 키 생성 함수 (정렬된 이름으로 고유 키 생성)
                const getTeamKey = (team1, team2) => {
                    const allPlayers = [...team1, ...team2].map(p => p.name).sort();
                    return allPlayers.join('-');
                };

                // 연속 경기 확인 함수
                const canPlayInMatch = (players, matchIndex) => {
                    return players.every(player => {
                        const lastMatch = memberLastMatch[player.name];
                        return lastMatch < matchIndex - 1; // 최소 1라운드 휴식
                    });
                };

                // 최적의 팀 조합 찾기 함수
                const findBestTeamCombination = (availableMembers, matchIndex) => {
                    let bestCombination = null;
                    let minPlayCountDiff = Infinity;
                    let attempts = 0;
                    const maxAttempts = 100;

                    while (attempts < maxAttempts && availableMembers.length >= 4) {
                        let team1, team2;
                        
                        if (completelyRandom) {
                            // 완전 랜덤 매칭
                            const shuffled = [...availableMembers].sort(() => Math.random() - 0.5);
                            team1 = shuffled.slice(0, 2);
                            team2 = shuffled.slice(2, 4);
                        } else {
                            // 설정에 따른 스마트 매칭
                            let candidates = [...availableMembers];
                            
                            // 실력순 반영시 정렬 (하지만 약간의 랜덤성 추가)
                            if (skillBased) {
                                candidates.sort((a, b) => {
                                    const skillDiff = b.skill - a.skill;
                                    const randomFactor = (Math.random() - 0.5) * 0.5; // 약간의 랜덤성
                                    return skillDiff + randomFactor;
                                });
                            }
                            
                            // 성별 구분시 같은 성별끼리 우선 매칭
                            if (genderSeparated) {
                                const males = candidates.filter(m => m.gender === '남');
                                const females = candidates.filter(m => m.gender === '여');
                                const others = candidates.filter(m => m.gender === '없음');
                                
                                if (males.length >= 4) {
                                    team1 = males.slice(0, 2);
                                    team2 = males.slice(2, 4);
                                } else if (females.length >= 4) {
                                    team1 = females.slice(0, 2);
                                    team2 = females.slice(2, 4);
                                } else if (others.length >= 4) {
                                    team1 = others.slice(0, 2);
                                    team2 = others.slice(2, 4);
                                } else {
                                    // 혼성으로 매칭
                                    team1 = candidates.slice(0, 2);
                                    team2 = candidates.slice(2, 4);
                                }
                            } else {
                                // 성별 구분 없이 매칭
                                team1 = candidates.slice(0, 2);
                                team2 = candidates.slice(2, 4);
                            }
                        }

                        const teamKey = getTeamKey(team1, team2);
                        const allPlayers = [...team1, ...team2];

                        // 조건 확인: 중복 조합 방지, 연속 경기 방지
                        if (!usedTeamCombinations.has(teamKey) && canPlayInMatch(allPlayers, matchIndex)) {
                            // 경기 균형 점수 계산 (참여 횟수 차이가 적을수록 좋음)
                            const playCountDiff = Math.max(...allPlayers.map(p => memberPlayCount[p.name])) - 
                                                Math.min(...allPlayers.map(p => memberPlayCount[p.name]));
                            
                            if (playCountDiff < minPlayCountDiff) {
                                minPlayCountDiff = playCountDiff;
                                bestCombination = { team1, team2, teamKey };
                            }
                            
                            // 완벽한 조합을 찾으면 바로 반환
                            if (playCountDiff === 0) {
                                break;
                            }
                        }

                        attempts++;
                        
                        // 후보군을 약간 섞어서 다시 시도
                        availableMembers.sort(() => Math.random() - 0.5);
                    }

                    return bestCombination;
                };

                // 매치 생성 로직
                for (let i = 0; i < matchCount; i++) {
                    const matchCourts = [];
                    let availableMembers = [...members];
                    
                    for (let court = 0; court < courtCount && availableMembers.length >= 4; court++) {
                        const combination = findBestTeamCombination(availableMembers, i);
                        
                        if (combination) {
                            const { team1, team2, teamKey } = combination;
                            
                            // 조합 사용 표시
                            usedTeamCombinations.add(teamKey);
                            
                            // 참여 횟수 및 마지막 경기 업데이트
                            [...team1, ...team2].forEach(player => {
                                memberPlayCount[player.name]++;
                                memberLastMatch[player.name] = i;
                            });
                            
                            // 사용된 멤버들을 availableMembers에서 제거
                            availableMembers = availableMembers.filter(m => 
                                !team1.includes(m) && !team2.includes(m)
                            );

                            matchCourts.push({
                                courtId: court,
                                team1: team1.filter(Boolean),
                                team2: team2.filter(Boolean)
                            });
                        }
                    }
                    
                    if (matchCourts.length > 0) {
                        generatedMatches.push({
                            matchId: i,
                            courts: matchCourts
                        });
                    }
                }

                return generatedMatches;
            }, [meetingData, gameSettings]);

            // 초기 매치 생성
            useEffect(() => {
                if (meetingData && gameSettings) {
                    console.log('매치 생성 시작:', { meetingData, gameSettings });
                    const newMatches = generateMatches();
                    console.log('생성된 매치:', newMatches);
                    setMatches(newMatches);
                    
                    // 게임 결과 초기화
                    const initialResults = {};
                    newMatches.forEach(match => {
                        match.courts.forEach(court => {
                            initialResults[`${match.matchId}-${court.courtId}`] = {
                                team1Score: '',
                                team2Score: ''
                            };
                        });
                    });
                    setGameResults(initialResults);
                    
                    // 랭킹 초기화
                    const initialRankings = {};
                    meetingData.members.forEach(member => {
                        initialRankings[member.name] = {
                            wins: 0,
                            gamesWon: 0,
                            gamesLost: 0,
                            matches: Array(gameSettings.matchCount).fill('')
                        };
                    });
                    setRankings(initialRankings);
                }
            }, [meetingData, gameSettings, generateMatches]);

            // 랭킹 계산
            useEffect(() => {
                if (!meetingData || !matches.length) return;

                const newRankings = {};
                meetingData.members.forEach(member => {
                    newRankings[member.name] = {
                        wins: 0,
                        gamesWon: 0,
                        gamesLost: 0,
                        matches: Array(matches.length).fill('')
                    };
                });

                // 결과 계산
                matches.forEach((match, matchIndex) => {
                    match.courts.forEach(court => {
                        const resultKey = `${match.matchId}-${court.courtId}`;
                        const result = gameResults[resultKey];
                        
                        if (result && result.team1Score !== '' && result.team2Score !== '') {
                            const score1 = parseInt(result.team1Score) || 0;
                            const score2 = parseInt(result.team2Score) || 0;
                            
                            court.team1.forEach(member => {
                                newRankings[member.name].gamesWon += score1;
                                newRankings[member.name].gamesLost += score2;
                                if (score1 > score2) {
                                    newRankings[member.name].wins += 1;
                                    newRankings[member.name].matches[matchIndex] = 'W';
                                } else if (score1 < score2) {
                                    newRankings[member.name].matches[matchIndex] = 'L';
                                } else {
                                    newRankings[member.name].matches[matchIndex] = 'D';
                                }
                            });
                            
                            court.team2.forEach(member => {
                                newRankings[member.name].gamesWon += score2;
                                newRankings[member.name].gamesLost += score1;
                                if (score2 > score1) {
                                    newRankings[member.name].wins += 1;
                                    newRankings[member.name].matches[matchIndex] = 'W';
                                } else if (score2 < score1) {
                                    newRankings[member.name].matches[matchIndex] = 'L';
                                } else {
                                    newRankings[member.name].matches[matchIndex] = 'D';
                                }
                            });
                        }
                    });
                });

                setRankings(newRankings);
            }, [gameResults, matches, meetingData]);

            const updateScore = (matchId, courtId, team, score) => {
                // 입력 검증
                if (score !== '' && (isNaN(score) || parseInt(score) < 0)) {
                    return; // 잘못된 입력 무시
                }
                
                // 최대 점수 제한 (설정에 따라)
                const maxScore = gameSettings?.gameType || 6;
                if (score !== '' && parseInt(score) > maxScore * 2) {
                    return; // 너무 높은 점수 무시
                }
                
                const key = `${matchId}-${courtId}`;
                setGameResults(prev => ({
                    ...prev,
                    [key]: {
                        ...prev[key],
                        [`${team}Score`]: score
                    }
                }));
            };

            const handleSave = () => {
                if (!meetingData) return;
                
                const updatedMeeting = {
                    ...meetingData,
                    gameSettings,
                    matches,
                    gameResults,
                    rankings,
                    lastUpdated: new Date().toISOString()
                };
                
                onSave(updatedMeeting);
                alert('저장되었습니다.');
            };

            const handleShare = async () => {
                if (!meetingData) return;
                
                try {
                    // 현재 경기 상태를 먼저 저장
                    const updatedMeeting = {
                        ...meetingData,
                        gameSettings,
                        matches,
                        gameResults,
                        rankings,
                        lastUpdated: new Date().toISOString()
                    };
                    
                    // 서버 모드인 경우 Firebase에 저장
                    if (serverMode === 'server' && roomCode) {
                        try {
                            if (window.firebaseDB) {
                                const { doc, setDoc } = window.firebaseUtils;
                                const roomRef = doc(window.firebaseDB, 'rooms', roomCode);
                                
                                // 현재 방 데이터를 가져와서 업데이트
                                const { getDoc } = window.firebaseUtils;
                                const roomSnap = await getDoc(roomRef);
                                let currentMeetings = [];
                                
                                if (roomSnap.exists()) {
                                    const roomData = roomSnap.data();
                                    currentMeetings = roomData.meetings || [];
                                }
                                
                                // 현재 모임 업데이트 또는 추가
                                const updatedMeetings = currentMeetings.map(m => 
                                    m.id === updatedMeeting.id ? updatedMeeting : m
                                );
                                if (!currentMeetings.find(m => m.id === updatedMeeting.id)) {
                                    updatedMeetings.push(updatedMeeting);
                                }
                                
                                await setDoc(roomRef, {
                                    clubName: clubName,
                                    meetings: updatedMeetings,
                                    lastUpdated: new Date().toISOString(),
                                    createdAt: new Date().toISOString()
                                }, { merge: true });
                                
                                console.log('🔥 Firebase에 저장 완료');
                            }
                        } catch (error) {
                            console.error('Firebase 저장 실패:', error);
                            throw error;
                        }
                    } else {
                        // 로컬에도 저장
                        const savedMeetings = localStorage.getItem('tennis-meetings');
                        let meetings = [];
                        if (savedMeetings) {
                            meetings = JSON.parse(savedMeetings);
                        }
                        const updatedMeetings = meetings.map(m => 
                            m.id === updatedMeeting.id ? updatedMeeting : m
                        );
                        if (!meetings.find(m => m.id === updatedMeeting.id)) {
                            updatedMeetings.push(updatedMeeting);
                        }
                        localStorage.setItem('tennis-meetings', JSON.stringify(updatedMeetings));
                    }
                    
                    // 공유 URL 생성
                    const baseUrl = `${window.location.origin}${window.location.pathname}`;
                    const shareUrl = serverMode === 'server' && roomCode 
                        ? `${baseUrl}?room=${roomCode}&meeting=${meetingData.id}`
                        : `${baseUrl}?share=${meetingData.id}`;
                    
                    // 공유 텍스트 생성
                    const shareTitle = `${meetingData.name} - Tennis Score AI`;
                    const shareText = `테니스 경기를 실시간으로 확인하세요!\n현재 순위: ${Object.entries(rankings)
                        .sort(([,a], [,b]) => {
                            if (b.wins !== a.wins) return b.wins - a.wins;
                            if (b.gamesWon !== a.gamesWon) return b.gamesWon - a.gamesWon;
                            return a.gamesLost - b.gamesLost;
                        })
                        .slice(0, 3)
                        .map(([name, data], index) => `${index + 1}위 ${name}(${data.wins}승)`)
                        .join(', ')}`;

                    // Web Share API 사용 가능 여부 확인
                    if (navigator.share && navigator.canShare) {
                        try {
                            await navigator.share({
                                title: shareTitle,
                                text: shareText,
                                url: shareUrl
                            });
                            return;
                        } catch (error) {
                            console.log('Web Share API 실패, 폴백 사용:', error);
                        }
                    }
                    
                    // 폴백 1: 클립보드 API 시도
                    if (navigator.clipboard && window.isSecureContext) {
                        try {
                            await navigator.clipboard.writeText(shareUrl);
                            alert(`경기 현황이 저장되었습니다!\n공유 링크가 클립보드에 복사되었습니다.\n\n${shareText}`);
                            return;
                        } catch (error) {
                            console.log('클립보드 API 실패, 최종 폴백 사용:', error);
                        }
                    }
                    
                    // 폴백 2: 텍스트 영역을 이용한 복사
                    const textArea = document.createElement('textarea');
                    textArea.value = shareUrl;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-9999px';
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    
                    try {
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                        alert(`경기 현황이 저장되었습니다!\n공유 링크가 클립보드에 복사되었습니다.\n\n${shareText}`);
                    } catch (error) {
                        document.body.removeChild(textArea);
                        // 폴백 3: 사용자에게 직접 링크 제공
                        const result = prompt(`경기 현황이 저장되었습니다!\n아래 링크를 복사하여 공유하세요:\n\n${shareText}`, shareUrl);
                        if (result === null) {
                            alert('공유가 취소되었습니다.');
                        }
                    }
                    
                } catch (error) {
                    console.error('공유 중 오류 발생:', error);
                    alert('공유 중 오류가 발생했습니다. 다시 시도해주세요.');
                }
            };

            if (!meetingData || !gameSettings) {
                return (
                    <div className="p-4">
                        <h2 className="text-lg font-semibold mb-4">데이터를 불러오는 중...</h2>
                        <div className="text-sm text-gray-600">
                            <p>meetingData: {meetingData ? '있음' : '없음'}</p>
                            <p>gameSettings: {gameSettings ? '있음' : '없음'}</p>
                        </div>
                    </div>
                );
            }

            const sortedRankings = Object.entries(rankings)
                .sort(([,a], [,b]) => {
                    if (b.wins !== a.wins) return b.wins - a.wins;
                    if (b.gamesWon !== a.gamesWon) return b.gamesWon - a.gamesWon;
                    return a.gamesLost - b.gamesLost;
                });

            return (
                <div className="pb-20">
                    <div className="flex items-center p-4 bg-white shadow-sm">
                        <button 
                            onClick={onBack}
                            className="text-blue-500 mr-3 text-lg"
                        >
                            ← 뒤로
                        </button>
                        <h1 className="text-xl font-bold text-gray-800">{meetingData.name || '테니스 경기'}</h1>
                    </div>

                    {/* 순위표 */}
                    <div className="p-4">
                        <div className="bg-white rounded-lg shadow-md mb-4">
                            <div className="p-4 border-b">
                                <h2 className="text-lg font-semibold text-gray-700">순위표</h2>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className="bg-gray-50">
                                        <tr>
                                            <th className="p-2 text-left text-sm font-medium text-gray-700">순위</th>
                                            <th className="p-2 text-left text-sm font-medium text-gray-700">이름</th>
                                            <th className="p-2 text-center text-sm font-medium text-gray-700">승수</th>
                                            <th className="p-2 text-center text-sm font-medium text-gray-700">게임득</th>
                                            <th className="p-2 text-center text-sm font-medium text-gray-700">게임실</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sortedRankings.map(([name, data], index) => (
                                            <tr key={name} className={index % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                                                <td className="p-2 text-sm font-medium">{index + 1}</td>
                                                <td className="p-2 text-sm">{name}</td>
                                                <td className="p-2 text-sm text-center text-blue-600 font-medium">{data.wins}</td>
                                                <td className="p-2 text-sm text-center text-green-600">{data.gamesWon}</td>
                                                <td className="p-2 text-sm text-center text-red-600">{data.gamesLost}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* 경기 스케줄 */}
                        <div className="bg-white rounded-lg shadow-md">
                            <div className="p-4 border-b">
                                <h2 className="text-lg font-semibold text-gray-700">경기 스케줄</h2>
                            </div>
                            <div className="p-4 space-y-4">
                                {matches.length === 0 ? (
                                    <div className="text-center py-8 text-gray-500">
                                        <p>경기가 생성되지 않았습니다.</p>
                                        <p className="text-sm mt-2">멤버 수가 부족하거나 설정에 문제가 있을 수 있습니다.</p>
                                    </div>
                                ) : (
                                    matches.map(match => (
                                    <div key={match.matchId} className="border rounded-lg p-3">
                                        <h3 className="font-medium text-gray-700 mb-3">{match.matchId + 1}경기</h3>
                                        {match.courts.map(court => (
                                            <div key={court.courtId} className="mb-3 last:mb-0">
                                                <div className="text-sm text-gray-600 mb-2">{court.courtId + 1}번 코트</div>
                                                <div className="flex items-center space-x-2">
                                                    <div className="flex-1 text-sm">
                                                        {court.team1.map(m => m.name).join(', ')}
                                                    </div>
                                                    <input
                                                        type="number"
                                                        value={gameResults[`${match.matchId}-${court.courtId}`]?.team1Score || ''}
                                                        onChange={(e) => updateScore(match.matchId, court.courtId, 'team1', e.target.value)}
                                                        className="w-12 p-1 text-center border rounded focus:ring-2 focus:ring-blue-500"
                                                        min="0"
                                                        max={gameSettings?.gameType * 2 || 12}
                                                        inputMode="numeric"
                                                        pattern="[0-9]*"
                                                    />
                                                    <span className="text-gray-500">:</span>
                                                    <input
                                                        type="number"
                                                        value={gameResults[`${match.matchId}-${court.courtId}`]?.team2Score || ''}
                                                        onChange={(e) => updateScore(match.matchId, court.courtId, 'team2', e.target.value)}
                                                        className="w-12 p-1 text-center border rounded focus:ring-2 focus:ring-blue-500"
                                                        min="0"
                                                        max={gameSettings?.gameType * 2 || 12}
                                                        inputMode="numeric"
                                                        pattern="[0-9]*"
                                                    />
                                                    <div className="flex-1 text-right text-sm">
                                                        {court.team2.map(m => m.name).join(', ')}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 하단 고정 버튼들 */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 space-y-3">
                        <div className="flex space-x-3">
                            <button
                                onClick={handleSave}
                                className="btn-primary flex-1"
                            >
                                현재 상태 저장
                            </button>
                            <button
                                onClick={handleShare}
                                className="btn-secondary flex-1"
                            >
                                공유하기
                            </button>
                        </div>
                        <button
                            onClick={() => setShowSummary(true)}
                            className="btn-secondary w-full"
                        >
                            결과 정리 보기
                        </button>
                    </div>

                    {/* 결과 정리 모달 */}
                    {showSummary && (
                        <SummaryModal 
                            rankings={sortedRankings}
                            matches={matches}
                            gameResults={gameResults}
                            gameSettings={gameSettings}
                            onClose={() => setShowSummary(false)}
                        />
                    )}
                </div>
            );
        }

        // 결과 정리 모달 컴포넌트
        function SummaryModal({ rankings, matches, gameResults, gameSettings, onClose }) {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-lg w-full max-w-lg max-h-96 overflow-y-auto">
                        <div className="p-4 border-b flex justify-between items-center">
                            <h3 className="text-lg font-semibold">경기 결과 정리</h3>
                            <button
                                onClick={onClose}
                                className="text-gray-500 text-xl"
                            >
                                ×
                            </button>
                        </div>
                        
                        <div className="p-4">
                            {/* 최종 순위 */}
                            <div className="mb-6">
                                <h4 className="font-semibold mb-3 text-gray-700">최종 순위</h4>
                                <div className="space-y-2">
                                    {rankings.slice(0, 3).map(([name, data], index) => (
                                        <div key={name} className="flex justify-between items-center p-2 bg-gray-50 rounded">
                                            <span className="font-medium">
                                                {index + 1}위. {name}
                                            </span>
                                            <span className="text-sm text-gray-600">
                                                {data.wins}승 ({data.gamesWon}-{data.gamesLost})
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 경기 통계 */}
                            <div className="mb-6">
                                <h4 className="font-semibold mb-3 text-gray-700">경기 통계</h4>
                                <div className="space-y-1 text-sm">
                                    <div>총 경기 수: {matches.length}경기</div>
                                    <div>코트 수: {gameSettings?.courtCount}개</div>
                                    <div>게임 형식: {gameSettings?.gameType}게임</div>
                                </div>
                            </div>

                            {/* 전체 순위 */}
                            <div>
                                <h4 className="font-semibold mb-3 text-gray-700">전체 순위</h4>
                                <div className="text-xs space-y-1">
                                    {rankings.map(([name, data], index) => (
                                        <div key={name} className="flex justify-between">
                                            <span>{index + 1}. {name}</span>
                                            <span>{data.wins}승 {data.gamesWon}-{data.gamesLost}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<TennisScoreboardApp />, document.getElementById('root'));
    </script>
</body>
</html>
